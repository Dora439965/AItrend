# @AI_GENERATED
name: Daily Data Update

on:
  schedule:
    # 每天 UTC 01:00（北京时间 09:00）运行
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch GitHub & News data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BAIDU_TRANSLATE_APPID: ${{ secrets.BAIDU_TRANSLATE_APPID }}
          BAIDU_TRANSLATE_SECRET: ${{ secrets.BAIDU_TRANSLATE_SECRET }}
        run: node scripts/update-data.mjs

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update daily data snapshot [skip ci]"
          git pull --rebase origin main
          git push
# @AI_GENERATED: end
